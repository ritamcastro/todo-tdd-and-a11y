<svg width="100%" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      :root {
        --board: #afa6bbff;
        --board-stroke: #27183c;
        --clip: #714384;
        --clip-stroke: #27183c;
        --lines: #714384;
      }
    </style>
  </defs>



  <g id="Clipboard"> 
    <rect x="190" y="140" width="300" height="390" rx="18" fill="var(--board)" stroke="var(--board-stroke)" stroke-width="2"/>

    <rect x="260" y="118" width="160" height="56" rx="10" fill="var(--clip)" stroke="var(--clip-stroke)" stroke-width="2"/>
    <rect x="296" y="108" width="88" height="30" rx="15" fill="var(--board-stroke)" stroke="var(--clip-stroke)" stroke-width="1.5"/>

    <rect x="220" y="195" width="240" height="16" rx="4" fill="var(--lines)" />
    <rect x="220" y="228" width="240" height="16" rx="4" fill="var(--lines)" />
    <rect x="220" y="261" width="240" height="16" rx="4" fill="var(--lines)" />
    <rect x="220" y="294" width="240" height="16" rx="4" fill="var(--lines)" />
  </g>
</svg>
